name: Auto Deploy Backend

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build dan Push Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-app ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-app

      - name: Deploy ke VPS
        uses: appleboy/ssh-action@0.1.10
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.PRIVATE_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-app
            docker stop backend || true
            docker rm backend || true
            docker run -d -p 5000:5000 \
              --env-file /root/project/TASK-MANAGER-APP/backend/.env \
              -e NODE_ENV=production \
              --name backend \
              ${{ secrets.DOCKER_USERNAME }}/backend-app
